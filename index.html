<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reels Feed - محاكاة وميضية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ================================
         Island 10: Main Scroll Container
         ================================ -->
    <div class="reels-container" id="reelsContainer" aria-label="Reels video feed">
        <!-- يتم حقن عناصر .reel-item ديناميكياً عبر JavaScript -->
    </div>

    <!-- قالب SVG مخفي لإعادة الاستخدام (Avoids duplicating SVG markup) -->
    <svg style="display:none;" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <!-- أيقونة القلب (Like) -->
        <symbol id="icon-heart" viewBox="0 0 24 24">
            <path fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </symbol>
        <!-- أيقونة القلب الممتلئ (Liked) -->
        <symbol id="icon-heart-filled" viewBox="0 0 24 24">
            <path fill="#ff2d55" stroke="#ff2d55" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </symbol>
        <!-- أيقونة المشاركة (Share) -->
        <symbol id="icon-share" viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="2.8" fill="none" stroke="#fff" stroke-width="2"/>
            <circle cx="6" cy="12" r="2.8" fill="none" stroke="#fff" stroke-width="2"/>
            <circle cx="18" cy="19" r="2.8" fill="none" stroke="#fff" stroke-width="2"/>
            <line x1="8.6" y1="10.8" x2="15.4" y2="6.2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="15.4" y1="17.8" x2="8.6" y2="13.2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <!-- أيقونة الصوت نشط (Unmuted) -->
        <symbol id="icon-volume-on" viewBox="0 0 24 24">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5" fill="none" stroke="#fff" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" fill="none" stroke="#fff"
            stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <!-- أيقونة الصوت مكتوم (Muted) -->
        <symbol id="icon-volume-off" viewBox="0 0 24 24">
            <polygon points="11,5 6,9 2,9 2,15 6,15 11,19 11,5" fill="none" stroke="#fff" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="23" y1="9" x2="17" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <line x1="17" y1="9" x2="23" y2="15" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        </symbol>
        <!-- أيقونة علامة التحقق -->
        <symbol id="icon-verified" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="11" fill="#1d9bf0" stroke="none"/>
            <polyline points="7,12.5 10.5,16 17,9" fill="none" stroke="#fff" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
        </symbol>
        <!-- قلب كبير للـ Double-Tap -->
        <symbol id="icon-heart-large" viewBox="0 0 24 24">
            <path fill="#ff2d55" stroke="none"
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 1 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </symbol>
    </svg>

    <script src="script.js"></script>
</body>
</html>
